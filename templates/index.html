<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroBlade Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <main class="container">
        <header>
            <h1>AeroBlade<span>.</span></h1>
            <form id="search-form">
                <input type="text" id="city-input" placeholder="Enter a city name..." autocomplete="off">
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
        </header>

        <div id="loading" class="hidden">Syncing atmospheric matrices...</div>

        <div id="dashboard" class="hidden">

            <div class="dashboard-grid">

                <div class="glass-card main-temp animate-pop delay-1">
                    <h2 id="loc-name">City Name</h2>
                    <p id="loc-desc" class="desc">Condition</p>
                    <div class="temp-display">
                        <span id="temp-val">0</span>°C
                    </div>
                    <p class="feels-like">Feels like <span id="feels-val">0</span>°C</p>
                </div>

                <div class="glass-card sun-curve-card animate-pop delay-2">
                    <div class="sun-card-header">
                        <h4><i class="fa-solid fa-circle-half-stroke text-yellow"></i> Solar Trajectory</h4>
                        <div class="sun-times-badge">
                            <span id="sunrise-val">--:--</span> • <span id="sunset-val">--:--</span>
                        </div>
                    </div>
                    <div class="canvas-container">
                        <canvas id="sunArcCanvas"></canvas>
                    </div>
                </div>

            </div>

            <div class="details-grid">
                <div class="glass-card detail animate-pop delay-3">
                    <i class="fa-solid fa-droplet text-blue card-icon"></i>
                    <h4>Humidity</h4>
                    <p><span id="hum-val">0</span>%</p>
                </div>

                <div class="glass-card detail animate-pop delay-4">
                    <i class="fa-solid fa-wind text-teal card-icon"></i>
                    <h4>Wind Speed</h4>
                    <p><span id="wind-val">0</span> km/h</p>
                </div>

                <div class="glass-card detail animate-pop delay-5">
                    <i class="fa-solid fa-gauge text-purple card-icon"></i>
                    <h4>Atmosphere</h4>
                    <p><span id="press-val">0</span> hPa</p>
                </div>

                <div class="glass-card detail animate-pop delay-6">
                    <i class="fa-solid fa-leaf text-green card-icon"></i>
                    <h4>Air Quality</h4>
                    <p id="aqi-val">--</p>
                </div>
            </div>

        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
